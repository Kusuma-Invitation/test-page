<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kusuma Invitation</title>
    
    <!-- SDK Firebase Versi Kompatibel -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            background-color: #1a1a1a; 
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; font-family: 'Arial', sans-serif; overflow: hidden;
        }

        .container {
            width: 100%; max-width: 450px; height: 100vh;
            background: #000; overflow-y: scroll;
            scroll-snap-type: y mandatory; scroll-behavior: smooth;
            position: relative; box-shadow: 0 0 50px rgba(0,0,0,0.8); z-index: 5;
        }
        .container::-webkit-scrollbar { display: none; }

        section {
            height: 100vh; width: 100%; scroll-snap-align: start;
            position: relative; display: flex; justify-content: center; align-items: center; text-align: center;
        }

        video { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 1; }

        .content { position: relative; z-index: 3; padding: 20px; width: 100%; text-shadow: 2px 2px 8px rgba(0,0,0,0.9); }

        /* Tombol Maps - Posisi diturunkan seimbang */
        .content-raised {
            align-self: flex-end;
            margin-bottom: 180px; 
        }

        .btn {
            background: #d4af37; color: white; padding: 12px 25px;
            border: none; border-radius: 50px; cursor: pointer;
            font-weight: bold; text-decoration: none; display: inline-block;
            margin-top: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.4);
        }

        /* Countdown Putih */
        .countdown { display: flex; justify-content: center; gap: 10px; margin: 20px 0; color: #ffffff; }
        .countdown-item {
            background: rgba(255, 255, 255, 0.15); backdrop-filter: blur(5px);
            padding: 10px; border-radius: 10px; min-width: 65px; border: 1px solid rgba(255,255,255,0.3);
        }
        .countdown-item span { display: block; font-size: 1.6rem; font-weight: bold; }

        #namaTamu { font-size: 2.2rem; color: #f1c40f; margin-top: 10px; }

        /* Buku Tamu Real-time */
        .comment-box {
            background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px);
            padding: 15px; border-radius: 15px; margin-top: 20px;
            max-height: 250px; overflow-y: auto; text-align: left;
        }
        .comment-item {
            background: rgba(255, 255, 255, 0.9); color: #333;
            padding: 10px; border-radius: 8px; margin-bottom: 10px; font-size: 0.85rem;
        }
        .comment-item b { color: #4b0082; display: block; margin-bottom: 2px; }

        input, textarea, select {
            width: 100%; padding: 10px; margin: 5px 0;
            border-radius: 8px; border: none; background: rgba(255,255,255,0.9);
        }

        #halaman1 { background: linear-gradient(135deg, #4b0082, #8a2be2); z-index: 10; }
    </style>
</head>
<body>

<audio id="musikLatar" loop><source src="Lestari.mp3" type="audio/mpeg"></audio>

<div class="container" id="mainContainer">
    
    <!-- HALAMAN 1 -->
    <section id="halaman1">
        <div class="content">
            <h1 style="color: white;">Kusuma & Partner</h1>
            <div class="countdown">
                <div class="countdown-item"><span id="days">00</span><label>Hari</label></div>
                <div class="countdown-item"><span id="hours">00</span><label>Jam</label></div>
                <div class="countdown-item"><span id="minutes">00</span><label>Menit</label></div>
                <div class="countdown-item"><span id="seconds">00</span><label>Detik</label></div>
            </div>
            <button class="btn" onclick="mulaiUndangan()">BUKA UNDANGAN</button>
        </div>
    </section>

    <!-- HALAMAN 2 -->
    <section>
        <video loop playsinline muted preload="auto" class="bg-vid"><source src="https://raw.githubusercontent.com/Kusuma-Invitation/test-page/main/halaman%202.mp4" type="video/mp4"></video>
        <div class="content"><p style="color:white">Kepada Yth:</p><h2 id="namaTamu">Nama Tamu</h2></div>
    </section>

    <!-- HALAMAN 3-4 -->
    <section><video loop playsinline muted preload="auto" class="bg-vid"><source src="https://raw.githubusercontent.com/Kusuma-Invitation/test-page/main/halaman%203.mp4" type="video/mp4"></video></section>
    <section><video loop playsinline muted preload="auto" class="bg-vid"><source src="https://raw.githubusercontent.com/Kusuma-Invitation/test-page/main/halaman%204.mp4" type="video/mp4"></video></section>

    <!-- HALAMAN 5 - Lokasi -->
    <section>
        <video loop playsinline muted preload="auto" class="bg-vid"><source src="https://raw.githubusercontent.com/Kusuma-Invitation/test-page/main/halaman%205.mp4" type="video/mp4"></video>
        <div class="content content-raised">
            <a href="https://maps.google.com/maps?q=-7.4653138%2C111.4087301&z=17&hl=en" target="_blank" class="btn">LIHAT DI GOOGLE MAPS</a>
        </div>
    </section>

    <!-- HALAMAN 6-7 -->
    <section><video loop playsinline muted preload="auto" class="bg-vid"><source src="https://raw.githubusercontent.com/Kusuma-Invitation/test-page/main/halaman%206.mp4" type="video/mp4"></video></section>
    <section><video loop playsinline muted preload="auto" class="bg-vid"><source src="https://raw.githubusercontent.com/Kusuma-Invitation/test-page/main/halaman%207.mp4" type="video/mp4"></video></section>

    <!-- HALAMAN 8 - Buku Tamu Real-time -->
    <section>
        <video loop playsinline muted preload="auto" class="bg-vid"><source src="https://raw.githubusercontent.com/Kusuma-Invitation/test-page/main/halaman%208.mp4" type="video/mp4"></video>
        <div class="content">
            <h3 style="color:white">Buku Tamu</h3>
            <p style="color:white">Halo, <b id="displayNamaUser">Tamu</b></p>
            <select id="statusHadir">
                <option value="Hadir">Hadir</option>
                <option value="Tidak Hadir">Tidak Hadir</option>
            </select>
            <textarea id="ucapan" placeholder="Berikan ucapan doa restu..."></textarea>
            <button class="btn" onclick="simpanKomentar()">KIRIM UCAPAN</button>

            <div class="comment-box" id="listKomentar">
                <!-- List ucapan tamu muncul di sini -->
            </div>
        </div>
    </section>

    <!-- HALAMAN 9-10 -->
    <section><video loop playsinline muted preload="auto" class="bg-vid"><source src="https://raw.githubusercontent.com/Kusuma-Invitation/test-page/main/halaman%209.mp4" type="video/mp4"></video></section>
    <section><video loop playsinline muted preload="auto" class="bg-vid"><source src="https://raw.githubusercontent.com/Kusuma-Invitation/test-page/main/halaman%2010.mp4" type="video/mp4"></video></section>

</div>

<script>
    // 1. Inisialisasi Firebase dengan Config Kamu
    const firebaseConfig = {
        apiKey: "AIzaSyAZWfcVAeChQxDY4eKIyJd_CfTE3MV2rGE",
        authDomain: "kusuma-invitation.firebaseapp.com",
        databaseURL: "https://kusuma-invitation-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "kusuma-invitation",
        storageBucket: "kusuma-invitation.firebasestorage.app",
        messagingSenderId: "567655297410",
        appId: "1:567655297410:web:62a89b0c286f542bff1f9b",
        measurementId: "G-W7EKM2J61N"
    };

    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    // 2. Ambil Nama Tamu dari URL
    const urlParams = new URLSearchParams(window.location.search);
    const namaTamu = urlParams.get('to') || "Tamu Undangan";
    document.getElementById('namaTamu').innerText = namaTamu;
    document.getElementById('displayNamaUser').innerText = namaTamu;

    // 3. Simpan Ucapan ke Firebase
    function simpanKomentar() {
        const status = document.getElementById('statusHadir').value;
        const pesan = document.getElementById('ucapan').value;

        if(!pesan) return alert("Silakan isi ucapan terlebih dahulu.");

        database.ref('komentar').push({
            nama: namaTamu,
            status: status,
            ucapan: pesan,
            waktu: new Date().toLocaleString('id-ID')
        });

        document.getElementById('ucapan').value = "";
    }

    // 4. Tampilkan Ucapan Secara Real-time
    database.ref('komentar').on('value', (snapshot) => {
        const list = document.getElementById('listKomentar');
        list.innerHTML = "";
        snapshot.forEach((child) => {
            const data = child.val();
            list.innerHTML += `
                <div class="comment-item">
                    <b>${data.nama} <small>(${data.status})</small></b>
                    ${data.ucapan}
                </div>
            `;
        });
        list.scrollTop = list.scrollHeight;
    });

    // 5. Logika Navigasi & Video
    const container = document.getElementById('mainContainer');
    const videos = document.querySelectorAll('.bg-vid');
    const audio = document.getElementById('musikLatar');
    
    container.style.overflowY = 'hidden';

    function mulaiUndangan() {
        container.style.overflowY = 'scroll';
        audio.play().catch(e => console.log(e));
        container.children[1].scrollIntoView({ behavior: 'smooth' });
    }

    container.addEventListener('scroll', () => {
        videos.forEach(v => {
            const pos = v.getBoundingClientRect();
            if(pos.top < window.innerHeight && pos.bottom > 0) v.play();
            else v.pause();
        });
    });

    // 6. Countdown
    const weddingDate = new Date("May 28, 2026 09:00:00").getTime();
    setInterval(() => {
        const now = new Date().getTime();
        const d = weddingDate - now;
        document.getElementById("days").innerHTML = Math.floor(d / (1000 * 60 * 60 * 24));
        document.getElementById("hours").innerHTML = Math.floor((d % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
        document.getElementById("minutes").innerHTML = Math.floor((d % (1000 * 60 * 60)) / (1000 * 60));
        document.getElementById("seconds").innerHTML = Math.floor((d % (1000 * 60)) / 1000);
    }, 1000);
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kusuma Invitation</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            background-color: #1a1a1a; 
            background-image: url('https://images.unsplash.com/photo-1519741497674-611481863552?auto=format&fit=crop&w=1350&q=80'); 
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
        }

        .container {
            width: 100%;
            max-width: 450px;
            height: 100vh;
            background: #000;
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
            scroll-behavior: smooth;
            position: relative;
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
            z-index: 5;
        }

        .container::-webkit-scrollbar { display: none; }

        section {
            height: 100vh;
            width: 100%;
            scroll-snap-align: start;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        video {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover;
            z-index: 1;
        }

        .content { 
            position: relative; 
            z-index: 3; 
            padding: 20px; 
            width: 100%;
            text-shadow: 1px 1px 5px rgba(0,0,0,0.7); 
        }

        /* Tombol Maps dinaikkan jauh lebih tinggi */
        .content-raised {
            align-self: flex-end;
            margin-bottom: 250px; 
        }

        .btn {
            background: #d4af37; color: white; padding: 12px 25px;
            border: none; border-radius: 50px; cursor: pointer;
            font-weight: bold; text-decoration: none; display: inline-block;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            margin-top: 15px;
        }

        .countdown {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin: 20px 0;
            color: #ffffff;
        }
        .countdown-item {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(5px);
            padding: 10px;
            border-radius: 10px;
            min-width: 65px;
            border: 1px solid rgba(255,255,255,0.3);
        }
        .countdown-item span { display: block; font-size: 1.6rem; font-weight: bold; }
        .countdown-item label { font-size: 0.7rem; text-transform: uppercase; }

        #namaTamu { font-size: 2.2rem; color: #f1c40f; margin-top: 10px; }

        input, textarea, select {
            width: 100%; padding: 10px; margin: 5px 0;
            border-radius: 8px; border: none; background: rgba(255,255,255,0.9);
        }

        .bank-card {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            padding: 15px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.3);
            margin-top: 10px;
        }

        #halaman1 { 
            background: linear-gradient(135deg, #4b0082, #8a2be2); 
            z-index: 10; 
        }
    </style>
</head>
<body>

<audio id="musikLatar" loop><source src="Lestari.mp3" type="audio/mpeg"></audio>

<div class="container" id="mainContainer">
    
    <!-- HALAMAN 1 -->
    <section id="halaman1">
        <div class="content">
            <h1 style="color: white; margin-bottom: 5px;">Kusuma & Partner</h1>
            <p style="color: rgba(255,255,255,0.9);">Kami menantikan kehadiran Anda dalam:</p>
            <div class="countdown">
                <div class="countdown-item"><span id="days">00</span><label>Hari</label></div>
                <div class="countdown-item"><span id="hours">00</span><label>Jam</label></div>
                <div class="countdown-item"><span id="minutes">00</span><label>Menit</label></div>
                <div class="countdown-item"><span id="seconds">00</span><label>Detik</label></div>
            </div>
            <button class="btn" onclick="mulaiUndangan()">BUKA UNDANGAN</button>
        </div>
    </section>

    <!-- HALAMAN 2 -->
    <section>
        <video loop playsinline muted class="bg-vid"><source src="https://raw.githubusercontent.com/Kusuma-Invitation/test-page/main/halaman%202.mp4" type="video/mp4"></video>
        <div class="content"><p>Kepada Yth:</p><h2 id="namaTamu">Nama Tamu</h2></div>
    </section>

    <section><video loop playsinline muted class="bg-vid"><source src="https://raw.githubusercontent.com/Kusuma-Invitation/test-page/main/halaman%203.mp4" type="video/mp4"></video></section>
    <section><video loop playsinline muted class="bg-vid"><source src="https://raw.githubusercontent.com/Kusuma-Invitation/test-page/main/halaman%204.mp4" type="video/mp4"></video></section>

    <!-- HALAMAN 5: LOKASI (POSISI NAIK LAGI) -->
    <section>
        <video loop playsinline muted class="bg-vid"><source src="https://raw.githubusercontent.com/Kusuma-Invitation/test-page/main/halaman%205.mp4" type="video/mp4"></video>
        <div class="content content-raised">
            <a href="https://maps.google.com/maps?q=-7.4653138%2C111.4087301&z=17&hl=en" target="_blank" class="btn">LIHAT DI GOOGLE MAPS</a>
        </div>
    </section>

    <section><video loop playsinline muted class="bg-vid"><source src="https://raw.githubusercontent.com/Kusuma-Invitation/test-page/main/halaman%206.mp4" type="video/mp4"></video></section>
    <section><video loop playsinline muted class="bg-vid"><source src="https://raw.githubusercontent.com/Kusuma-Invitation/test-page/main/halaman%207.mp4" type="video/mp4"></video></section>

    <!-- HALAMAN 8 -->
    <section>
        <video loop playsinline muted class="bg-vid"><source src="https://raw.githubusercontent.com/Kusuma-Invitation/test-page/main/halaman%208.mp4" type="video/mp4"></video>
        <div class="content">
            <h3>Konfirmasi Kehadiran</h3>
            <input type="text" id="inputNama" placeholder="Nama Anda">
            <select id="statusHadir">
                <option value="Hadir">Hadir</option>
                <option value="Tidak Hadir">Tidak Hadir</option>
            </select>
            <textarea id="ucapan" placeholder="Berikan ucapan..."></textarea>
            <button class="btn" onclick="kirimRSVP()">KIRIM UCAPAN</button>
        </div>
    </section>

    <!-- HALAMAN 9 -->
    <section>
        <video loop playsinline muted class="bg-vid"><source src="https://raw.githubusercontent.com/Kusuma-Invitation/test-page/main/halaman%209.mp4" type="video/mp4"></video>
        <div class="content">
            <h3>Wedding Gift</h3>
            <div class="bank-card">
                <p>Bank BCA</p>
                <p id="noRek">1234567890</p>
                <p>a/n Kusuma</p>
                <button class="btn" style="padding: 5px 15px; font-size: 0.8rem;" onclick="copyRek()">Salin Rekening</button>
            </div>
        </div>
    </section>

    <!-- HALAMAN 10 -->
    <section>
        <video loop playsinline muted class="bg-vid"><source src="https://raw.githubusercontent.com/Kusuma-Invitation/test-page/main/halaman%2010.mp4" type="video/mp4"></video>
    </section>

</div>

<script>
    const weddingDate = new Date("May 28, 2026 09:00:00").getTime();

    const countdownFunc = setInterval(function() {
        const now = new Date().getTime();
        const distance = weddingDate - now;

        const days = Math.floor(distance / (1000 * 60 * 60 * 24));
        const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
        const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
        const seconds = Math.floor((distance % (1000 * 60)) / 1000);

        document.getElementById("days").innerHTML = days;
        document.getElementById("hours").innerHTML = hours;
        document.getElementById("minutes").innerHTML = minutes;
        document.getElementById("seconds").innerHTML = seconds;

        if (distance < 0) {
            clearInterval(countdownFunc);
            document.querySelector(".countdown").innerHTML = "HARI BAHAGIA TELAH TIBA";
        }
    }, 1000);

    const urlParams = new URLSearchParams(window.location.search);
    document.getElementById('namaTamu').innerText = urlParams.get('to') || "Tamu Undangan";

    const container = document.getElementById('mainContainer');
    const videos = document.querySelectorAll('.bg-vid');
    const audio = document.getElementById('musikLatar');

    container.style.overflowY = 'hidden';

    function mulaiUndangan() {
        container.style.overflowY = 'scroll';
        audio.play().catch(e => console.log(e));
        container.children[1].scrollIntoView({ behavior: 'smooth' });
        checkVideos();
    }

    function checkVideos() {
        videos.forEach(v => {
            const pos = v.getBoundingClientRect();
            if(pos.top < window.innerHeight && pos.bottom > 0) v.play();
            else v.pause();
        });
    }

    function copyRek() {
        const rek = document.getElementById('noRek').innerText;
        navigator.clipboard.writeText(rek);
        alert("Nomor rekening disalin!");
    }

    function kirimRSVP() {
        const nama = document.getElementById('inputNama').value;
        const status = document.getElementById('statusHadir').value;
        const pesan = document.getElementById('ucapan').value;
        window.open(`https://wa.me/628123456789?text=Nama:+${nama}%0AHadir:+${status}%0APesan:+${pesan}`, '_blank');
    }

    container.addEventListener('scroll', checkVideos);
</script>

</body>
</html>

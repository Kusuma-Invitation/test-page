<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kusuma Invitation</title>
    
    <!-- SDK Firebase -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    
    <!-- Animate.css -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            background-color: #1a1a1a; 
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; font-family: 'Arial', sans-serif; overflow: hidden;
        }

        .container {
            width: 100%; max-width: 450px; height: 100vh;
            background: #000; overflow-y: scroll;
            scroll-snap-type: y mandatory; scroll-behavior: smooth;
            position: relative; box-shadow: 0 0 50px rgba(0,0,0,0.8); z-index: 5;
        }
        .container::-webkit-scrollbar { display: none; }

        section {
            height: 100vh; width: 100%; scroll-snap-align: start;
            position: relative; display: flex; justify-content: center; align-items: center; text-align: center;
            overflow: hidden;
        }

        video { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 1; }

        .content { position: relative; z-index: 3; padding: 20px; width: 100%; }

        /* No Shadow untuk Teks */
        .no-shadow { text-shadow: none !important; color: white; }

        .btn {
            background: #d4af37; color: white; padding: 12px 25px;
            border: none; border-radius: 50px; cursor: pointer;
            font-weight: bold; text-decoration: none; display: inline-block;
            margin-top: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.4);
        }

        /* Wedding Gift Box */
        .gift-container {
            display: flex; flex-direction: column; gap: 15px; align-items: center;
        }
        .gift-card {
            background: rgba(255, 255, 255, 0.95);
            padding: 20px; border-radius: 15px; width: 280px;
            color: #333; cursor: pointer; transition: transform 0.2s;
            border: 2px solid #d4af37;
        }
        .gift-card:active { transform: scale(0.95); }
        .bank-logo { height: 30px; margin-bottom: 10px; display: block; margin-left: auto; margin-right: auto; }
        .rekening { font-size: 1.2rem; font-weight: bold; letter-spacing: 1px; display: block; margin: 5px 0; }
        .salin-hint { font-size: 0.7rem; color: #d4af37; font-weight: bold; }

        /* Countdown & Buku Tamu tetap ada */
        .countdown { display: flex; justify-content: center; gap: 10px; margin: 20px 0; color: #ffffff; }
        .countdown-item {
            background: rgba(255, 255, 255, 0.15); backdrop-filter: blur(5px);
            padding: 10px; border-radius: 10px; min-width: 65px; border: 1px solid rgba(255,255,255,0.3);
        }
        .guestbook-wrapper { display: flex; flex-direction: column; height: 75vh; gap: 10px; width: 100%; }
        .comment-box {
            background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px);
            padding: 15px; border-radius: 15px; flex-grow: 1; overflow-y: auto; text-align: left;
        }
        .comment-item { background: rgba(255, 255, 255, 0.9); color: #333; padding: 10px; border-radius: 8px; margin-bottom: 10px; position: relative; }
        .btn-delete { position: absolute; top: 5px; right: 8px; color: #ff4d4d; cursor: pointer; border: none; background: none; font-weight: bold; }
        textarea, select { width: 100%; padding: 10px; margin: 5px 0; border-radius: 8px; border: none; }

        #halaman1 { background: linear-gradient(135deg, #4b0082, #8a2be2); z-index: 10; }
    </style>
</head>
<body>

<audio id="musikLatar" loop><source src="Lestari.mp3" type="audio/mpeg"></audio>

<div class="container" id="mainContainer">
    
    <!-- Halaman 1 -->
    <section id="halaman1">
        <div class="content animate__animated animate__fadeIn">
            <h1 class="no-shadow">Puji & Trimono, S.M</h1>
            <div class="countdown">
                <div class="countdown-item"><span id="days">00</span><label>Hari</label></div>
                <div class="countdown-item"><span id="hours">00</span><label>Jam</label></div>
                <div class="countdown-item"><span id="minutes">00</span><label>Menit</label></div>
                <div class="countdown-item"><span id="seconds">00</span><label>Detik</label></div>
            </div>
            <button class="btn animate__animated animate__infinite animate__pulse" onclick="mulaiUndangan()">BUKA UNDANGAN</button>
        </div>
    </section>

    <!-- Halaman 2: Nama Tamu -->
    <section>
        <video loop playsinline muted class="bg-vid"><source src="https://raw.githubusercontent.com/Kusuma-Invitation/test-page/main/halaman%202.mp4" type="video/mp4"></video>
        <div class="content animate__animated animate__zoomIn">
            <p class="no-shadow">Kepada Yth:</p>
            <h2 id="namaTamu" class="no-shadow" style="color: #f1c40f; font-size: 2.2rem;">Nama Tamu</h2>
        </div>
    </section>

    <!-- Halaman 3 - 7 (Gallery & Lokasi) -->
    <section><video loop playsinline muted class="bg-vid"><source src="https://raw.githubusercontent.com/Kusuma-Invitation/test-page/main/halaman%203.mp4" type="video/mp4"></video></section>
    <section><video loop playsinline muted class="bg-vid"><source src="https://raw.githubusercontent.com/Kusuma-Invitation/test-page/main/halaman%204.mp4" type="video/mp4"></video></section>
    <section>
        <video loop playsinline muted class="bg-vid"><source src="https://raw.githubusercontent.com/Kusuma-Invitation/test-page/main/halaman%205.mp4" type="video/mp4"></video>
        <div class="content" style="align-self: flex-end; margin-bottom: 150px;">
            <a href="https://maps.google.com/maps?q=-7.4653138%2C111.4087301&z=17&hl=en" target="_blank" class="btn animate__animated animate__bounceIn">LIHAT DI GOOGLE MAPS</a>
        </div>
    </section>
    <section><video loop playsinline muted class="bg-vid"><source src="https://raw.githubusercontent.com/Kusuma-Invitation/test-page/main/halaman%206.mp4" type="video/mp4"></video></section>
    <section><video loop playsinline muted class="bg-vid"><source src="https://raw.githubusercontent.com/Kusuma-Invitation/test-page/main/halaman%207.mp4" type="video/mp4"></video></section>

    <!-- Halaman 8: Buku Tamu -->
    <section>
        <video loop playsinline muted class="bg-vid"><source src="https://raw.githubusercontent.com/Kusuma-Invitation/test-page/main/halaman%208.mp4" type="video/mp4"></video>
        <div class="content">
            <div class="guestbook-wrapper animate__animated animate__fadeInUp">
                <div style="background: rgba(0,0,0,0.6); padding: 15px; border-radius: 15px;">
                    <h3 class="no-shadow">Buku Tamu</h3>
                    <select id="statusHadir"><option value="Hadir">Hadir</option><option value="Tidak Hadir">Tidak Hadir</option></select>
                    <textarea id="ucapan" placeholder="Tulis doa restu..."></textarea>
                    <button class="btn" onclick="simpanKomentar()">KIRIM</button>
                </div>
                <div class="comment-box" id="listKomentar"></div>
            </div>
        </div>
    </section>

    <!-- Halaman 9: Wedding Gift (Klik Nomor untuk Salin) -->
    <section>
        <video loop playsinline muted class="bg-vid"><source src="https://raw.githubusercontent.com/Kusuma-Invitation/test-page/main/halaman%209.mp4" type="video/mp4"></video>
        <div class="content gift-container animate__animated animate__fadeIn">
            <!-- BRI Card -->
            <div class="gift-card" onclick="copyToClipboard('0021234567890', 'BRI')">
                <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/2/2e/BRI_Logo.svg/1200px-BRI_Logo.svg.png" class="bank-logo" alt="BRI">
                <span class="rekening">0021234567890</span>
                <p>a/n Trimono</p>
                <span class="salin-hint">Klik untuk salin nomor</span>
            </div>

            <!-- BCA Card -->
            <div class="gift-card" onclick="copyToClipboard('8221234567', 'BCA')">
                <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/5/5c/Bank_Central_Asia.svg/1200px-Bank_Central_Asia.svg.png" class="bank-logo" alt="BCA">
                <span class="rekening">8221234567</span>
                <p>a/n Puji Rahayu</p>
                <span class="salin-hint">Klik untuk salin nomor</span>
            </div>
        </div>
    </section>

    <!-- Halaman 10: Closing -->
    <section><video loop playsinline muted class="bg-vid"><source src="https://raw.githubusercontent.com/Kusuma-Invitation/test-page/main/halaman%2010.mp4" type="video/mp4"></video></section>

</div>

<script>
    // Firebase Config (Data Anda)
    const firebaseConfig = {
        apiKey: "AIzaSyAZWfcVAeChQxDY4eKIyJd_CfTE3MV2rGE",
        authDomain: "kusuma-invitation.firebaseapp.com",
        databaseURL: "https://kusuma-invitation-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "kusuma-invitation",
        storageBucket: "kusuma-invitation.firebasestorage.app",
        messagingSenderId: "567655297410",
        appId: "1:567655297410:web:62a89b0c286f542bff1f9b",
        measurementId: "G-W7EKM2J61N"
    };

    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    // Fungsi Salin Rekening
    function copyToClipboard(number, bank) {
        navigator.clipboard.writeText(number).then(() => {
            alert("Nomor Rekening " + bank + " berhasil disalin!");
        });
    }

    // Ambil Nama Tamu
    const urlParams = new URLSearchParams(window.location.search);
    const namaTamu = urlParams.get('to') || "Tamu Undangan";
    document.getElementById('namaTamu').innerText = namaTamu;

    // Logika Firebase Buku Tamu
    function simpanKomentar() {
        const status = document.getElementById('statusHadir').value;
        const pesan = document.getElementById('ucapan').value;
        if(!pesan) return alert("Isi ucapan dulu!");
        database.ref('komentar').push({ nama: namaTamu, status: status, ucapan: pesan });
        document.getElementById('ucapan').value = "";
    }

    database.ref('komentar').on('value', (snapshot) => {
        const list = document.getElementById('listKomentar');
        list.innerHTML = "";
        snapshot.forEach((child) => {
            const data = child.val();
            list.innerHTML += `<div class="comment-item animate__animated animate__fadeInLeft">
                <button class="btn-delete" onclick="hapusKomentar('${child.key}')">X</button>
                <b>${data.nama} (${data.status})</b><br>${data.ucapan}</div>`;
        });
        list.scrollTop = list.scrollHeight;
    });

    function hapusKomentar(id) { if(confirm("Hapus ucapan?")) database.ref('komentar/' + id).remove(); }

    // Navigasi & Audio
    const container = document.getElementById('mainContainer');
    const audio = document.getElementById('musikLatar');
    container.style.overflowY = 'hidden';

    function mulaiUndangan() {
        container.style.overflowY = 'scroll';
        audio.play();
        container.children[1].scrollIntoView({ behavior: 'smooth' });
    }

    container.addEventListener('scroll', () => {
        document.querySelectorAll('.bg-vid').forEach(v => {
            const pos = v.getBoundingClientRect();
            if(pos.top < window.innerHeight && pos.bottom > 0) v.play(); else v.pause();
        });
    });

    // Countdown
    const weddingDate = new Date("May 28, 2026 09:00:00").getTime();
    setInterval(() => {
        const d = weddingDate - new Date().getTime();
        document.getElementById("days").innerHTML = Math.floor(d / (1000 * 60 * 60 * 24));
        document.getElementById("hours").innerHTML = Math.floor((d % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
        document.getElementById("minutes").innerHTML = Math.floor((d % (1000 * 60 * 60)) / (1000 * 60));
        document.getElementById("seconds").innerHTML = Math.floor((d % (1000 * 60)) / 1000);
    }, 1000);
</script>
</body>
</html>
